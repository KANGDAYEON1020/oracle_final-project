name: look-demo-stack

services:
  frontend:
    build:
      context: ../frontend
      dockerfile: ../deployment/frontend.Dockerfile
      args:
        EXPRESS_HOST: backend
        EXPRESS_PORT: "5002"
    image: look/frontend:demo
    container_name: look-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api
      EXPRESS_HOST: backend
      EXPRESS_PORT: "5002"
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - look-net

  backend:
    platform: linux/amd64
    build:
      context: ../backend
      dockerfile: ../deployment/backend.Dockerfile
    image: look/backend:demo
    container_name: look-backend
    restart: unless-stopped
    env_file:
      - ./.env.docker
    environment:
      NODE_ENV: production
      EXPRESS_PORT: "5002"
      SEPSIS_FLASK_ENABLED: "true"
      SEPSIS_FLASK_BASE_URL: "http://ml-api:8002"
      RAG_API_BASE: "http://rag:8001"
      DEMO_RESET_RESTORE_SNAPSHOT: "true"
      DEMO_RESET_SNAPSHOT_SCRIPT: "/app/data/scripts/08_load_synthetic_extensions.py"
      DEMO_RESET_PYTHON_BIN: "python"
    volumes:
      - ../data/scripts/08_load_synthetic_extensions.py:/app/data/scripts/08_load_synthetic_extensions.py:ro
      - ./oracle/instantclient_23_3:/opt/oracle/instantclient_23_3:ro
    ports:
      - "5002:5002"
    depends_on:
      ml-api:
        condition: service_healthy
      rag:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:5002/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 40s
    networks:
      - look-net

  ml-api:
    build:
      context: ../ml
      dockerfile: ../deployment/ml-api.Dockerfile
    image: look/ml-api:demo
    container_name: look-ml-api
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "8002:8002"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8002/health',timeout=3).status==200 else 1)\"",
        ]
      interval: 30s
      timeout: 6s
      retries: 5
      start_period: 90s
    networks:
      - look-net

  rag:
    build:
      context: ../rag
      dockerfile: ../deployment/rag.Dockerfile
    image: look/rag:demo
    container_name: look-rag
    restart: unless-stopped
    env_file:
      - ./.env.docker
    environment:
      PYTHONUNBUFFERED: "1"
      RAG_API_HOST: "0.0.0.0"
      RAG_API_PORT: "8001"
      HF_HOME: "/app/.cache/huggingface"
      TRANSFORMERS_CACHE: "/app/.cache/huggingface"
    ports:
      - "8001:8001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8001/health',timeout=3).status==200 else 1)\"",
        ]
      interval: 30s
      timeout: 6s
      retries: 6
      start_period: 120s
    networks:
      - look-net

networks:
  look-net:
    driver: bridge
